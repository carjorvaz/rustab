name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Check formatting
        run: nix develop -c cargo fmt --all -- --check

      - name: Check extension metadata
        run: nix develop -c python3 scripts/check_versions.py

      - name: Check extension JavaScript
        run: |
          node --check extensions/shared/background_core.js
          node --check extensions/chrome/background.js
          node --check extensions/chrome/background_core.js
          node --check extensions/firefox/background.js
          node --check extensions/firefox/background_core.js

      - name: Run clippy
        run: nix develop -c cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: nix develop -c cargo test

      - name: Run flake checks
        run: nix flake check --print-build-logs
